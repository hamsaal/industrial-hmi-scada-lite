<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Industrial HMI/SCADA Lite</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <p class="eyebrow">Prototype / Mock telemetry</p>
          <h1>Packaging Line Monitor</h1>
        </div>
        <span id="connectionState" class="status-badge">Live</span>
      </header>

      <section class="kpis" aria-label="Plant summary">
        <article>
          <span>Online</span>
          <strong id="onlineCount">0/0</strong>
        </article>
        <article>
          <span>Alarms</span>
          <strong id="alarmCount">0</strong>
        </article>
        <article>
          <span>Utilization</span>
          <strong id="utilizationAvg">0%</strong>
        </article>
        <article>
          <span>Throughput</span>
          <strong id="throughputTotal">0/h</strong>
        </article>
      </section>

      <section class="content">
        <section class="panel">
          <div class="panel__header">
            <div>
              <p class="eyebrow">Equipment</p>
              <h2>Status overview</h2>
            </div>
            <span id="lastUpdate">Waiting</span>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Tag</th>
                  <th>Name</th>
                  <th>State</th>
                  <th>Temp</th>
                  <th>Pressure</th>
                  <th>Vibration</th>
                  <th>Output</th>
                </tr>
              </thead>
              <tbody id="equipmentRows"></tbody>
            </table>
          </div>
        </section>

        <aside class="panel">
          <div class="panel__header">
            <div>
              <p class="eyebrow">Alarms</p>
              <h2>Active list</h2>
            </div>
            <button id="ackAllButton" type="button">Ack all</button>
          </div>

          <div id="alarmList" class="alarm-list" aria-live="polite"></div>
        </aside>
      </section>
    </main>

    <script type="module" src="./app.mjs"></script>
  </body>
</html>
